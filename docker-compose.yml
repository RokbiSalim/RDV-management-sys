services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak/rdv-realm.json:/opt/keycloak/data/import/rdv-realm.json:ro

  backend:
    build:
      context: ./backend/Stage-Marsa-RDV-Management-backend
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      JDBC_DATABASE_USERNAME: ${POSTGRES_USER}
      JDBC_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ISSUER_URI: http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
    ports:
      - "${BACKEND_PORT}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
      - keycloak

volumes:
  postgres-data:
