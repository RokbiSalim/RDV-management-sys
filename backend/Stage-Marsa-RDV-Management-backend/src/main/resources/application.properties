# Prefer environment-provided JDBC URL, fallback to localhost:5432
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/RDV-Prise-containerdb}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:Salim1011}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8081

# Bind to all network interfaces so the app is reachable from other hosts
server.address=0.0.0.0

# Disable Spring DevTools automatic restart in this environment to avoid
# unexpected restarts while running via Maven/IDE on Windows/OneDrive paths
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false

whatsapp.token=
whatsapp.phone-number-id=

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8082/realms/rdv-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8082/realms/rdv-realm/protocol/openid-connect/certs}
